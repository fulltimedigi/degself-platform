# Netlify config for degself.com — fully static deploy of the webapp.
# This file lives at the repo root so Netlify auto-detects it.
# The actual app lives in webapp/, so the build runs with base = "webapp"
# and publishes webapp/dist/public.

[build]
  base = "webapp"
  command = "npm install && npm run build:static"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# Disable Netlify's auto pretty-URLs (which lowercases paths and adds trailing
# slashes). place_ids from Google Maps are CASE-SENSITIVE — lowercase breaks them.
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

# Serve prerendered pages directly. /workshop/<id> → /workshop/<id>.html
# We use 200 (rewrite, not redirect) so the URL stays clean and Google sees the same URL.
[[redirects]]
  from = "/workshop/:id"
  to = "/workshop/:id.html"
  status = 200
  force = true

[[redirects]]
  from = "/governorate/:slug"
  to = "/governorate/:slug.html"
  status = 200
  force = true

[[redirects]]
  from = "/search"
  to = "/search.html"
  status = 200
  force = true

[[redirects]]
  from = "/map"
  to = "/map.html"
  status = 200
  force = true

[[redirects]]
  from = "/emergency"
  to = "/emergency.html"
  status = 200
  force = true

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200
  force = true

# SPA fallback for anything else — unmatched paths boot the React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Sitemap and robots — explicit MIME hints
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# Cache hashed static assets aggressively (filenames are content-hashed by Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache the data file but allow revalidation so updates propagate
[[headers]]
  for = "/data/workshops.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# PWA manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Service worker should never be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
