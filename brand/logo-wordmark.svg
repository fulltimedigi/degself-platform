<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240" role="img" aria-label="degself wordmark">
  <title>degself - Kuwait Auto Workshops Platform</title>

  <defs>
    <!-- Chrome gradient for key shaft -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="35%" stop-color="#F3F4F6"/>
      <stop offset="55%" stop-color="#FFFFFF"/>
      <stop offset="75%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <!-- Fob gradient -->
    <linearGradient id="fobGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE14A"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </linearGradient>
    <!-- Shoulder cap gradient -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#C99A00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="240" fill="#0A0A0A"/>

  <!-- Icon on the left (smart key) -->
  <g transform="translate(110, 110)">
    <g transform="rotate(-15)">
      <!-- Fob body -->
      <rect x="-38" y="-58" width="76" height="100" rx="20" fill="url(#fobGrad)"/>
      <!-- Subtle inner highlight -->
      <rect x="-34" y="-54" width="68" height="14" rx="7" fill="#FFFFFF" opacity="0.18"/>

      <!-- Start button -->
      <circle cx="0" cy="-18" r="18" fill="#0A0A0A"/>
      <circle cx="0" cy="-18" r="18" fill="none" stroke="#000" stroke-width="1" opacity="0.6"/>
      <g stroke="#FFD60A" stroke-width="2.6" stroke-linecap="round" fill="none">
        <path d="M -7 -24 A 9 9 0 1 0 7 -24"/>
        <line x1="0" y1="-28" x2="0" y2="-16"/>
      </g>

      <!-- Small function buttons -->
      <rect x="-23" y="12" width="18" height="8" rx="4" fill="#0A0A0A" opacity="0.78"/>
      <rect x="5" y="12" width="18" height="8" rx="4" fill="#0A0A0A" opacity="0.78"/>

      <!-- Shoulder cap connecting fob to shaft -->
      <path d="M -10 40 Q -10 48 -8 52 L 8 52 Q 10 48 10 40 Z" fill="url(#capGrad)"/>

      <!-- Professional laser-cut key shaft -->
      <g transform="translate(0, 52)">
        <!-- Main blade -->
        <path d="
          M -4 0
          L -4 38
          L -7 42
          L -7 48
          L -3 52
          L -3 58
          L -6 62
          L -6 68
          L -3 72
          L -3 78
          L 0 82
          L 3 78
          L 3 0
          Z
        " fill="url(#chromeGrad)" stroke="#374151" stroke-width="0.6"/>
        <!-- Center groove (laser-cut line) -->
        <line x1="0" y1="4" x2="0" y2="76" stroke="#1F2937" stroke-width="0.8" opacity="0.55"/>
        <!-- Tip highlight -->
        <path d="M -2 78 L 0 82 L 2 78" fill="none" stroke="#FFFFFF" stroke-width="0.6" opacity="0.7"/>
      </g>
    </g>
  </g>

  <!-- Wordmark "degself" -->
  <text x="220" y="128" fill="#FFFFFF" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="-3">
    deg<tspan fill="#FFD60A">self</tspan>
  </text>

  <!-- Tagline in Arabic -->
  <text x="220" y="168" fill="#9CA3AF" font-family="'Noto Sans Arabic', 'Segoe UI', Tahoma, Arial, sans-serif" font-size="22" font-weight="500" direction="rtl" text-anchor="start">
    دق سلف · ورش الكويت في جيبك
  </text>
</svg>
